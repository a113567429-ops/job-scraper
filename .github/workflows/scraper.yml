name: 金融实习岗位爬虫

on:
  schedule:
    # 每天 09:00 墨尔本时间 (AEST = UTC+10)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 支持在 GitHub 页面手动点击运行

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许把数据库变更 commit 回仓库

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 运行爬虫
        env:
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
          WECHAT_WEBHOOK:  ${{ secrets.WECHAT_WEBHOOK }}
          PYTHONIOENCODING: utf-8
        run: python main.py

      - name: 保存数据库变更
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.db output/ || true
          git diff --staged --quiet || git commit -m "chore: 自动更新职位数据库 $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin main
